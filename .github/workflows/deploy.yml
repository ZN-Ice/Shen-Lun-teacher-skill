name: CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'
      - '.github/workflows/cd.yml'

jobs:
  version-bump:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Bump version
      id: bump
      run: |
        # 安装标准版本工具
        npm install -g standard-version

        # 自动增加版本号（patch/minor/major）
        # 这里使用自动判断，实际可以根据 commit message 决定
        standard-version --release-as patch

        # 获取新版本号
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

        echo "New version: $NEW_VERSION"

    - name: Commit and push version
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git commit -am "chore: bump version to v${{ steps.bump.outputs.new_version }}"
        git tag v${{ steps.bump.outputs.new_version }}
        git push
        git push origin v${{ steps.bump.outputs.new_version }}

  release:
    runs-on: ubuntu-latest
    needs: version-bump

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.version-bump.outputs.tag }}

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.version-bump.outputs.tag }}
        release_name: Release ${{ needs.version-bump.outputs.tag }}
        body: |
          ## 更新内容
          自动发布的版本 ${{ needs.version-bump.outputs.new_version }}
        draft: false
        prerelease: false

  deploy:
    runs-on: ubuntu-latest
    needs: [version-bump, release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.version-bump.outputs.tag }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build package
      run: npm pack

    - name: Deploy notification
      run: |
        echo "🚀 Deployment completed!"
        echo "Version: ${{ needs.version-bump.outputs.new_version }}"
        echo "Tag: ${{ needs.version-bump.outputs.tag }}"

        # 这里可以添加实际部署逻辑，例如：
        # - 上传到 npm registry
        # - 部署到服务器
        # - 发送通知到 Slack/Discord 等

    - name: Notify OpenClaw
      if: success()
      run: |
        echo "📢 Notifying OpenClaw about new version..."
        # 这里可以添加 OpenClaw 通知逻辑
        # 例如调用 OpenClaw API 重新加载 skill

    - name: Summary
      run: |
        echo "## 🎉 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ needs.version-bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag**: ${{ needs.version-bump.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Successfully deployed" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
